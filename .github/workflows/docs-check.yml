name: Documentation Quality Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  markdown-lint:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      
      - name: Run markdownlint
        run: |
          markdownlint --ignore node_modules --ignore .git '**/*.md' || true
      
      - name: Check for broken links (basic)
        run: |
          echo "Checking for common markdown issues..."
          grep -r "\]\(\#" *.md || true

  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install yamllint
        run: pip install yamllint
      
      - name: Run yamllint
        run: |
          yamllint --no-warnings . || true

  shellcheck:
    name: Shell Script Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          ignore_paths: >-
            node_modules
            .git

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install codespell
        run: pip install codespell
      
      - name: Run codespell
        run: |
          codespell --skip="*.git,*.lock,*.min.js,node_modules" \
            --ignore-words-list="k8s,devops,terraform,nginx,redis,postgres" \
            || true

  file-structure:
    name: File Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check required directories
        run: |
          echo "Checking phase directories..."
          for phase in phase-{1..7}-*; do
            if [ -d "$phase" ]; then
              echo "✓ Found $phase"
            else
              echo "✗ Missing $phase"
            fi
          done
      
      - name: Check README files
        run: |
          echo "Checking for README files..."
          find . -type d -maxdepth 2 | while read dir; do
            if [ -f "$dir/README.md" ] || [ -f "$dir/readme.md" ]; then
              echo "✓ $dir has README"
            elif [[ "$dir" == *"/topic-"* ]] || [[ "$dir" == *"/phase-"* ]]; then
              echo "! $dir might need README"
            fi
          done

  link-validation:
    name: Internal Link Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check internal markdown links
        run: |
          echo "Validating internal links..."
          find . -name "*.md" -exec grep -H "\](\.\./" {} \; | head -20
          echo "Link validation complete"

  content-quality:
    name: Content Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for TODO markers
        run: |
          echo "Finding TODO markers..."
          grep -r "TODO\|FIXME\|XXX" --include="*.md" . || echo "No TODOs found"
      
      - name: Check code block formatting
        run: |
          echo "Checking code blocks..."
          grep -l '```' *.md **/*.md 2>/dev/null | head -10
          echo "Code block check complete"

  summary:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: [markdown-lint, yaml-lint, shellcheck, spell-check, file-structure, link-validation, content-quality]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Documentation Quality Check Summary"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| Markdown Lint | ${{ needs.markdown-lint.result }} |"
          echo "| YAML Lint | ${{ needs.yaml-lint.result }} |"
          echo "| ShellCheck | ${{ needs.shellcheck.result }} |"
          echo "| Spell Check | ${{ needs.spell-check.result }} |"
          echo "| File Structure | ${{ needs.file-structure.result }} |"
          echo "| Link Validation | ${{ needs.link-validation.result }} |"
          echo "| Content Quality | ${{ needs.content-quality.result }} |"
